name: Compilar UABEAvalonia iOS

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14
    
    steps:
    - name: Buscar archivos en el repositorio
      uses: actions/checkout@v4

    - name: Configurar SDK de .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Descomprimir el archivo del proyecto
      run: |
        unzip *.zip -d proyecto_extracted
        echo "PROJECT_PATH=$(find proyecto_extracted -name "*.csproj")" >> $GITHUB_ENV

    - name: Instalar cargas de trabajo de .NET (iOS y WASI)
      run: |
        dotnet workload install ios
        dotnet workload install wasi-experimental

    - name: Compilar proyecto con Dotnet Build (Forzado)
      env:
        # Variables de entorno globales para obligar a .NET a omitir comprobaciones estrictas de ciclo de vida
        DOTNET_SKIP_WORKLOAD_INTEGRITY_CHECK: 'true'
        MSBUILDDISABLENUGETAUDIT: 'true'
      run: |
        # Usamos flags avanzados para decirle a MSBuild que ignore las alertas de soporte y no las convierta en errores fatales
        dotnet build ${{ env.PROJECT_PATH }} -c Release -f net8.0-ios /p:CheckEolTargetFramework=false /p:BuildIpa=false /p:SuppressNETSDK1202=true /p:WarnAsError=false

    - name: Buscar y empaquetar el archivo IPA generado
      run: |
        mkdir -p output_artifacts
        find proyecto_extracted -name "*.app" -exec cp -r {} output_artifacts/ \;
        
        cd output_artifacts
        if [ -d *.app ]; then
          mkdir -p Payload
          cp -r *.app Payload/
          zip -r UABEAvalonia.ipa Payload/
          rm -rf Payload
        fi

    - name: Subir el archivo compilado para descargar
      uses: actions/upload-artifact@v4
      with:
        name: UABEAvalonia-iOS-IPA
        path: output_artifacts/
