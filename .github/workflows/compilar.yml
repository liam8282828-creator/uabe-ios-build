name: Compilar UABEAvalonia iOS

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14
    
    steps:
    - name: Buscar archivos en el repositorio
      uses: actions/checkout@v4

    - name: Configurar SDK de .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Descomprimir el archivo del proyecto
      run: |
        unzip *.zip -d proyecto_extracted
        echo "PROJECT_PATH=$(find proyecto_extracted -name "*.csproj")" >> $GITHUB_ENV

    - name: Instalar cargas de trabajo de .NET (iOS y WASI)
      run: |
        dotnet workload install ios
        dotnet workload install wasi-experimental

    - name: Compilar proyecto con Dotnet Build
      run: |
        # Usamos build en lugar de publish para evitar que NativeAOT bloquee la compilación por falta de firmas
        dotnet build ${{ env.PROJECT_PATH }} -c Release -f net8.0-ios /p:CheckEolTargetFramework=false /p:BuildIpa=false

    - name: Buscar y empaquetar el archivo IPA generado
      run: |
        mkdir -p output_artifacts
        # Buscamos la carpeta compilada .app y la copiamos
        find proyecto_extracted -name "*.app" -exec cp -r {} output_artifacts/ \;
        
        # Truco comunitario: Empaquetar la carpeta .app dentro de una estructura Payload para simular un .ipa
        cd output_artifacts
        if [ -d *.app ]; then
          mkdir -p Payload
          cp -r *.app Payload/
          zip -r UABEAvalonia.ipa Payload/
          rm -rf Payload
        fi

    - name: Subir el archivo compilado para descargar
      uses: actions/upload-artifact@v4
      with:
        name: UABEAvalonia-iOS-IPA
        path: output_artifacts/
